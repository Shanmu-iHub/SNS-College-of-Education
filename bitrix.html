<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/jpeg" href="static/images/favicon.jpg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admission and Enquiry Form - Dr. SNS College of Education</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ================= RESET & BASE ================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }

        /* ================= CONTAINER ================= */
        .container {
            max-width: 640px;
            margin: 40px auto;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        /* ================= HEADER ================= */
        .header {
            background: linear-gradient(135deg, #009846 0%, #007b38 100%);
            padding: 40px 30px;
            text-align: center;
            color: white;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 16px;
            opacity: 0.95;
            font-weight: 500;
        }

        /* ================= FORM SECTION ================= */
        .form-section {
            padding: 40px 30px;
        }

        .form-title {
            text-align: center;
            margin-bottom: 30px;
        }

        .form-title h2 {
            font-size: 24px;
            font-weight: 700;
            color: #1a202c;
            margin-bottom: 8px;
        }

        .form-title p {
            font-size: 14px;
            color: #718096;
        }

        /* ================= BITRIX FORM RESET ================= */
        .b24-form-wrapper {
            background: transparent !important;
            border: none !important;
            padding: 0 !important;
            box-shadow: none !important;
            margin: 0 !important;
        }

        .b24-form-header {
            display: none !important;
        }

        .b24-form-field {
            margin-bottom: 24px !important;
        }

        /* Remove Bitrix auto separators */
        .b24-form-separator,
        .b24-form-field-separator,
        .b24-form-field::before,
        .b24-form-field::after {
            display: none !important;
            content: none !important;
            height: 0 !important;
            border: none !important;
        }

        /* ================= LABEL HANDLING ================= */
        .b24-form-control-label {
            position: absolute !important;
            opacity: 0 !important;
            pointer-events: none !important;
        }

        /* ================= INPUT FIELDS ================= */
        .b24-form-control {
            width: 100% !important;
            background: #f7fafc !important;
            border: 2px solid #e2e8f0 !important;
            border-radius: 12px !important;
            padding: 14px 18px !important;
            font-size: 15px !important;
            font-family: 'Poppins', sans-serif !important;
            color: #1a202c !important;
            box-shadow: none !important;
            transition: all 0.3s ease !important;
        }

        .b24-form-control::placeholder {
            color: #a0aec0 !important;
            font-weight: 400 !important;
        }

        .b24-form-control:focus {
            border-color: #667eea !important;
            background: #ffffff !important;
            outline: none !important;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1) !important;
        }

        /* ================= DROPDOWN ================= */
        .b24-form-dropdown {
            border-radius: 12px !important;
            border: 2px solid #e2e8f0 !important;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1) !important;
            background: white !important;
        }

        .b24-form-dropdown-item {
            padding: 12px 18px !important;
            font-size: 15px !important;
            font-family: 'Poppins', sans-serif !important;
            color: #1a202c !important;
            transition: all 0.2s ease !important;
        }

        .b24-form-dropdown-item:hover {
            background: #f7fafc !important;
            color: #667eea !important;
        }

        /* ================= SUBMIT BUTTON ================= */
        .b24-form-btn {
            width: 100% !important;
            margin-top: 28px !important;
            padding: 16px 24px !important;
            border-radius: 12px !important;
            background: linear-gradient(135deg, #009846 0%, #007b38 100%) !important;
            color: #ffffff !important;
            font-size: 16px !important;
            font-weight: 600 !important;
            border: none !important;
            font-family: 'Poppins', sans-serif !important;
            cursor: pointer !important;
            transition: all 0.3s ease !important;
            box-shadow: 0 4px 15px rgba(0, 152, 70, 0.4) !important;
        }

        .b24-form-btn:hover {
            transform: translateY(-2px) !important;
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5) !important;
        }

        .b24-form-btn:active {
            transform: translateY(0) !important;
        }

        /* ================= FOOTER TEXT ================= */
        .b24-form-sign {
            margin-top: 24px !important;
            font-size: 12px !important;
            color: #a0aec0 !important;
            text-align: center !important;
        }

        /* ================= INFO SECTION ================= */
        .info-section {
            background: #f7fafc;
            padding: 30px;
            border-top: 1px solid #e2e8f0;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .info-item {
            display: flex;
            align-items: start;
            gap: 12px;
        }

        .info-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #009846 0%, #007b38 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            flex-shrink: 0;
        }

        .info-content h3 {
            font-size: 14px;
            font-weight: 600;
            color: #1a202c;
            margin-bottom: 4px;
        }

        .info-content p {
            font-size: 13px;
            color: #718096;
            line-height: 1.5;
        }

        .info-content a {
            color: #667eea;
            text-decoration: none;
        }

        .info-content a:hover {
            text-decoration: underline;
        }

        /* ================= RESPONSIVE ================= */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .container {
                margin: 20px auto;
                border-radius: 16px;
            }

            .header {
                padding: 30px 20px;
            }

            .header h1 {
                font-size: 24px;
            }

            .header p {
                font-size: 14px;
            }

            .form-section {
                padding: 30px 20px;
            }

            .form-title h2 {
                font-size: 20px;
            }

            .info-section {
                padding: 20px;
            }

            .info-grid {
                grid-template-columns: 1fr;
            }
        }

        /* ================= LOADING ANIMATION ================= */
        .loading {
            text-align: center;
            padding: 40px;
            color: #718096;
        }

        .spinner {
            border: 3px solid #f3f4f6;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>Dr. SNS College of Education</h1>
            <p>Redesigning Common Minds & Business Towards Excellence</p>
        </div>

        <!-- Form Section -->
        <div class="form-section">
            <div class="form-title">
                <h2>Admission and Enquiry Form</h2>
                <p>Fill out the form below and we'll get back to you shortly</p>
            </div>

            <!-- Loading State -->
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Loading form...</p>
            </div>

            
                <!-- Custom Form UI matching reference -->
                <form class="space-y-6 mt-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-900 mb-2">Full Name <span class="text-red-500">*</span></label>
                        <input type="text" placeholder="Enter your full name" class="w-full border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 text-gray-700" required>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-bold text-gray-900 mb-2">Course Selection <span class="text-red-500">*</span></label>
                        <select class="w-full border border-gray-200 rounded-xl px-4 py-3 text-gray-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 appearance-none bg-white" required>
                            <option value="" disabled selected>Select a course</option>
                            <option value="B.Ed">B.Ed</option>
                            <option value="M.Ed">M.Ed</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-bold text-gray-900 mb-2">Email ID <span class="text-red-500">*</span></label>
                        <input type="email" placeholder="Enter your email address" class="w-full border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 text-gray-700" required>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-bold text-gray-900 mb-2">Date of Birth <span class="text-red-500">*</span></label>
                        <input type="date" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-gray-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500" required>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-bold text-gray-900 mb-2">Phone Number <span class="text-red-500">*</span></label>
                        <input type="tel" placeholder="Enter phone number with country code (e.g., +91...)" class="w-full border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 text-gray-700" required>
                    </div>
                    
                    <button type="submit" class="w-full bg-[#8b91cc] hover:bg-[#7b81bc] text-white font-bold text-lg py-4 rounded-xl transition duration-300">
                        Call Me
                    </button>
                </form>

</body>

</html>
